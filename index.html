<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAU/USD Trading Journal</title>
    <!-- Tailwind CSS ve FontAwesome Yüklemesi -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK Kurulumları -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Yapılandırma Ayarları
        const firebaseConfig = {
            apiKey: "AIzaSyC0U6uXDpb_herX0tUxQDgU98sFqHcSeVw",
            authDomain: "analyzedout-4bf8e.firebaseapp.com",
            databaseURL: "https://analyzedout-4bf8e-default-rtdb.europe-west3.firebasedatabase.app",
            projectId: "analyzedout-4bf8e",
            storageBucket: "analyzedout-4bf8e.appspot.com",
            messagingSenderId: "930744089925",
            appId: "1:930744089925:web:f034b0edfb5fd8af84522c",
            measurementId: "G-S6KK4GX7G0"
        };

        // Firebase'i Başlat
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Küresel Değişkenler
        let currentAccountId = "default_account";
        let trades = [];
        let notes = [];
        let balance = 10000;
        let transactions = [];

        function updateUI() {
            console.log("Arayüz yenileniyor...", { balance, tradesCount: trades.length });
        }

        // ANLIK BULUTTAN VERİ ÇEKME
        function loadOnlineData() {
            const userRef = ref(db, 'journal/' + currentAccountId);
            onValue(userRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    trades = data.trades || [];
                    notes = data.notes || [];
                    balance = data.balance || 10000;
                    transactions = data.transactions || [];
                } else {
                    trades = []; notes = []; balance = 10000; transactions = [];
                }
                updateUI();
            });
        }

        // BULUTA KAYDETME
        function saveOnlineData() {
            set(ref(db, 'journal/' + currentAccountId), {
                trades: trades,
                notes: notes,
                balance: balance,
                transactions: transactions
            });
        }

        window.addTrade = function(tradeData) {
            trades.push(tradeData);
            saveOnlineData();
        };

        window.addEventListener('DOMContentLoaded', () => {
            loadOnlineData();
        });
    </script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased">
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4 text-amber-500"><i class="fa-solid fa-chart-line mr-2"></i>XAU/USD Bulut Destekli Trading Journal</h1>
        <p class="text-sm text-gray-400">Verileriniz şu anda Firebase Realtime Database ile anlık olarak senkronize edilmektedir.</p>
    </div>
</body>
</html>
