<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Trading Journal</title>
    <!-- Tailwind CSS & FontAwesome CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Giriş ekranı için tam ekran sabitleme */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
        }
        /* Gizleme sınıfı */
        .hidden-app {
            display: none !important;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <!-- 🔐 GİRİŞ PANELİ (SAYFA AÇILIR AÇILMAZ ÇALIŞIR) -->
    <div id="login-overlay" class="bg-gray-950 flex flex-col items-center justify-center p-4">
        <div class="bg-gray-900 p-8 rounded-2xl shadow-2xl border border-yellow-600/30 w-full max-w-md text-center">
            <div class="text-yellow-500 text-5xl mb-4">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Giriş Yetkilendirmesi</h2>
            <p class="text-gray-400 text-sm mb-6">Trading günlüğüne erişmek için şifrenizi giriniz.</p>
            
            <div class="relative mb-4">
                <input type="password" id="journal-password" placeholder="••••" 
                       class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-center text-2xl tracking-widest text-white focus:outline-none focus:border-yellow-500 transition-colors">
            </div>
            
            <button id="btn-login" class="w-full bg-gradient-to-r from-yellow-600 to-amber-500 hover:from-yellow-500 hover:to-amber-400 text-gray-950 font-bold py-3 rounded-xl transition-all shadow-lg transform active:scale-95">
                Sisteme Giriş Yap
            </button>
            <p id="login-error" class="text-red-500 text-sm mt-3 hidden">Hatalı Şifre! Erişim Engellendi.</p>
        </div>
    </div>

    <!-- 📊 ANA UYGULAMA ARAYÜZÜ (ŞİFRESİZ GÖZÜKMEZ) -->
    <div id="main-app" class="hidden-app">
        
        <!-- Üst Bar / Navigasyon -->
        <header class="bg-gray-850 border-b border-gray-800 p-4 sticky top-0 z-40 shadow-md">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-xl font-black tracking-wider text-yellow-500">
                    <i class="fas fa-chart-line mr-2"></i>SOVEREIGN JOURNAL
                </h1>
                
                <!-- Kontrol Butonları -->
                <div class="flex items-center gap-3">
                    <!-- ☁️ BULUTA YEDEKLE BUTONU -->
                    <button id="btnYedekle" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-sm font-semibold transition-all flex items-center gap-2 shadow-md">
                        <i class="fas fa-cloud-upload-alt"></i> Buluta Yedekle
                    </button>
                    
                    <button id="btnSifirla" class="bg-red-600/20 hover:bg-red-600 hover:text-white text-red-400 px-4 py-2 rounded-xl text-sm font-semibold transition-all border border-red-500/30">
                        <i class="fas fa-trash-alt"></i> Günlüğü Sıfırla
                    </button>
                </div>
            </div>
        </header>

        <!-- İçerik Alanı -->
        <main class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Sol Sütun: İşlem Ekleme Formu -->
            <section class="bg-gray-850 p-6 rounded-2xl border border-gray-800 h-fit shadow-xl">
                <h3 class="text-lg font-bold text-white mb-4 border-b border-gray-800 pb-2 flex items-center gap-2">
                    <i class="fas fa-plus-circle text-yellow-500"></i> Yeni İşlem Ekle
                </h3>
                <form id="trade-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Parite / Varlık</label>
                        <input type="text" id="trade-asset" placeholder="XAUUSD, BTC, ETH" required
                               class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-yellow-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Yön</label>
                            <select id="trade-direction" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-yellow-500">
                                <option value="BUY" class="text-green-400 font-bold">BUY (Long)</option>
                                <option value="SELL" class="text-red-400 font-bold">SELL (Short)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Sonuç</label>
                            <select id="trade-result" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-yellow-500">
                                <option value="TP" class="text-green-400 font-bold">PROFIT (TP)</option>
                                <option value="SL" class="text-red-400 font-bold">LOSS (SL)</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Kar / Zarar ($)</label>
                        <input type="number" id="trade-pnl" placeholder="0.00" required step="any"
                               class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-yellow-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Notlar (SMC / ICT Detayları)</label>
                        <textarea id="trade-notes" rows="3" placeholder="Örn: FVG retest, SMT divergence görüldü..."
                                  class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-yellow-500 text-sm"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-400 text-gray-950 font-bold py-3 rounded-xl shadow-md transition-all">
                        İşlemi Canlı Kaydet
                    </button>
                </form>
            </section>

            <!-- Sağ Sütun: İşlem Listesi ve Özet -->
            <section class="lg:grid-cols-2 lg:col-span-2 space-y-6">
                <!-- Canlı Veri Listesi -->
                <div class="bg-gray-850 p-6 rounded-2xl border border-gray-800 shadow-xl">
                    <h3 class="text-lg font-bold text-white mb-4 border-b border-gray-800 pb-2 flex justify-between items-center">
                        <span><i class="fas fa-history text-blue-400 mr-2"></i>İşlem Geçmişi (Canlı Cloud)</span>
                        <span id="sync-status" class="text-xs text-green-400 font-medium"><i class="fas fa-check-circle"></i> Firebase Yükleniyor...</span>
                    </h3>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-gray-800 text-gray-400 text-xs uppercase">
                                    <th class="py-3 px-4">Tarih</th>
                                    <th class="py-3 px-4">Varlık</th>
                                    <th class="py-3 px-4">Yön</th>
                                    <th class="py-3 px-4">Sonuç</th>
                                    <th class="py-3 px-4 text-right">P&L</th>
                                </tr>
                            </thead>
                            <tbody id="trade-logs-body" class="divide-y divide-gray-800 text-sm">
                                <!-- Dinamik JavaScript verisi buraya gelecek -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 🔥 FIREBASE SDK (SINGLE PAGE İÇİN EN KARARLI COMPAT SÜRÜMÜ) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // 🔑 GÜVENLİK AYARLARI
        const GUVENLIK_SIFRESI = "6592";
        let localTradingData = []; // Canlı verilerin runtime hafızası

        // 🔥 SİZİN GERÇEK FIREBASE YAPILANDIRMANIZ (BAŞARIYLA ENTEGRE EDİLDİ)
        const firebaseConfig = {
            apiKey: "AIzaSyC0U6uXDpb_herXOtUxQDgU90sFqHCseVw",
            authDomain: "analyzedout-4bf8e.firebaseapp.com",
            databaseURL: "https://analyzedout-4bf8e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "analyzedout-4bf8e",
            storageBucket: "analyzedout-4bf8e.firebasestorage.app",
            messagingSenderId: "930744089925",
            appId: "1:930744089925:web:f034b0edfb5fd8af84522c",
            measurementId: "G-S6KK4GXZG0"
        };

        // Firebase Başlatma
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // Verilerin bulutta kaydolacağı döküman yolu
        const journalDocRef = db.collection("trading_journal").doc("metin_trades");

        // 🛡️ GİRİŞ KONTROLÜ (SAYFA AÇILDIĞINDA TETİKLENİR)
        const loginOverlay = document.getElementById("login-overlay");
        const mainApp = document.getElementById("main-app");
        const passwordInput = document.getElementById("journal-password");
        const loginBtn = document.getElementById("btn-login");
        const errorMsg = document.getElementById("login-error");

        function appGirisiniDene() {
            if (passwordInput.value === GUVENLIK_SIFRESI) {
                // Şifre doğruysa kilitli ekranı kaldır, paneli göster
                loginOverlay.style.display = "none";
                mainApp.classList.remove("hidden-app");
                
                // Başarılı giriş sonrasında verileri Firestore bulutundan canlı olarak çek
                buluttanVeriYukle();
            } else {
                errorMsg.classList.remove("hidden");
                passwordInput.value = "";
                passwordInput.focus();
            }
        }

        // Giriş butonları tetikleyicileri
        loginBtn.addEventListener("click", appGirisiniDene);
        passwordInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") appGirisiniDene();
        });

        // ☁️ FIREBASE VERİ AKTARIMI
        
        // Buluttan Veri Çekme
        async function buluttanVeriYukle() {
            document.getElementById("sync-status").innerHTML = `<i class="fas fa-spinner fa-spin"></i> Buluttan yükleniyor...`;
            try {
                const doc = await journalDocRef.get();
                if (doc.exists) {
                    localTradingData = doc.data().trades || [];
                    tabloyuGuncelle();
                    document.getElementById("sync-status").innerHTML = `<i class="fas fa-check-circle text-green-400"></i> Canlı Veri Güncel`;
                } else {
                    document.getElementById("sync-status").innerHTML = `<i class="fas fa-info-circle text-yellow-400"></i> Bulutta kayıt yok, ilk işleminizi ekleyin`;
                    tabloyuGuncelle();
                }
            } catch (error) {
                console.error("Bulut okuma hatası:", error);
                document.getElementById("sync-status").innerHTML = `<i class="fas fa-exclamation-triangle text-red-500"></i> Bulut Bağlantı Hatası!`;
            }
        }

        // Buluta Canlı Veri Yazma
        async function bulutaCanliKaydet() {
            document.getElementById("sync-status").innerHTML = `<i class="fas fa-sync fa-spin"></i> Canlı kaydediliyor...`;
            try {
                await journalDocRef.set({
                    trades: localTradingData,
                    sonGuncelleme: new Date().toISOString()
                });
                document.getElementById("sync-status").innerHTML = `<i class="fas fa-check-circle text-green-400"></i> Canlı Eşitlendi`;
            } catch (error) {
                console.error("Buluta yazma hatası:", error);
                alert("Canlı bulut kaydı başarısız oldu! Firestore kurallarını kontrol edin.");
            }
        }

        // 📥 YENİ İŞLEM FORMU GÖNDERME
        document.getElementById("trade-form").addEventListener("submit", async (e) => {
            e.preventDefault();

            const yeniIslem = {
                id: Date.now(),
                tarih: new Date().toLocaleDateString("tr-TR"),
                asset: document.getElementById("trade-asset").value.toUpperCase(),
                direction: document.getElementById("trade-direction").value,
                result: document.getElementById("trade-result").value,
                pnl: parseFloat(document.getElementById("trade-pnl").value),
                notes: document.getElementById("trade-notes").value
            };

            // Listeye ekle ve hemen tabloyu güncelle
            localTradingData.unshift(yeniIslem);
            tabloyuGuncelle();
            
            // Formu temizle
            document.getElementById("trade-form").reset();

            // ⚡ Doğrudan Canlı Firebase Kaydı
            await bulutaCanliKaydet();
        });

        // 🔄 TABLO GÜNCELLEME (RENDER)
        function tabloyuGuncelle() {
            const tbody = document.getElementById("trade-logs-body");
            tbody.innerHTML = "";

            if (localTradingData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-6 text-gray-500">Kayıtlı işlem bulunamadı.</td></tr>`;
                return;
            }

            localTradingData.forEach(trade => {
                const pnlClass = trade.pnl >= 0 ? "text-green-400" : "text-red-400";
                const dirClass = trade.direction === "BUY" ? "bg-green-500/10 text-green-400" : "bg-red-500/10 text-red-400";
                const resClass = trade.result === "TP" ? "text-green-500" : "text-red-500";

                const tr = document.createElement("tr");
                tr.className = "border-b border-gray-800/50 hover:bg-gray-800/30 transition-colors";
                tr.innerHTML = `
                    <td class="py-3 px-4 text-gray-400 text-xs">${trade.tarih}</td>
                    <td class="py-3 px-4 font-bold text-white">${trade.asset}</td>
                    <td class="py-3 px-4"><span class="px-2 py-0.5 rounded text-xs font-bold ${dirClass}">${trade.direction}</span></td>
                    <td class="py-3 px-4 font-bold ${resClass}">${trade.result}</td>
                    <td class="py-3 px-4 text-right font-mono font-bold ${pnlClass}">${trade.pnl >= 0 ? '+' : ''}${trade.pnl}$</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ☁️ MANUEL "BULUTA YEDEKLE" BUTTONU
        document.getElementById("btnYedekle").addEventListener("click", async () => {
            const btn = document.getElementById("btnYedekle");
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Yedekleniyor...`;
            btn.disabled = true;

            await bulutaCanliKaydet();

            btn.innerHTML = `<i class="fas fa-cloud-upload-alt"></i> Buluta Yedekle`;
            btn.disabled = false;
            alert("Harika! Tüm verileriniz şu an Firebase bulutuna manuel olarak senkronize edildi. 🚀");
        });

        // 🗑️ GÜNLÜĞÜ SIFIRLAMA (ŞİFRE KORUMALI)
        document.getElementById("btnSifirla").addEventListener("click", async () => {
            const teyitSifresi = prompt("DİKKAT: Tüm veriler buluttan tamamen silinecektir!\nOnaylamak için güvenlik şifresini girin:");
            
            if (teyitSifresi === GUVENLIK_SIFRESI) {
                localTradingData = [];
                tabloyuGuncelle();
                await bulutaCanliKaydet();
                alert("Tüm verileriniz Firebase bulutundan başarıyla temizlendi.");
            } else if (teyitSifresi !== null) {
                alert("Hatalı şifre! Sıfırlama işlemi reddedildi.");
            }
        });
    </script>
</body>
</html>
