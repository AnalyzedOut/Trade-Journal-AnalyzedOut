<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAU Trading Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-tab { background-color: #0ea5e9; color: white !important; }
        .active-tab i, .active-tab span { color: white !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .dark-card { background-color: #0f172a; border: 1px solid #1e293b; }
        .dark-input { background-color: #1e293b; border: 1px solid #334155; color: #f8fafc; }
        .dark-input:focus { border-color: #0ea5e9; ring: 2px; ring-color: #0ea5e9; }
        
        /* Bulut Yükleme Ekranı */
        #cloud-loader {
            position: fixed; inset: 0; background: #020617; z-index: 9999;
            display: flex; flex-direction: column; items-center; justify-content: center;
        }
        .loading-spinner {
            width: 50px; height: 50px; border: 5px solid #1e293b; border-top: 5px solid #0ea5e9;
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex overflow-hidden relative">

    <!-- Yükleme Ekranı: Firebase verisi gelene kadar her şeyi gizler -->
    <div id="cloud-loader">
        <div class="loading-spinner"></div>
        <p class="text-sky-500 font-bold tracking-widest animate-pulse uppercase">Veriler Buluttan Çekiliyor...</p>
    </div>

    <!-- Lock Screen -->
    <div id="lock-screen" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl text-center space-y-6">
            <div class="flex items-center justify-center space-x-2 text-sky-500 font-bold text-2xl tracking-tight">
                <i data-lucide="trending-up" class="w-8 h-8"></i>
                <span>AnalyzedOut</span>
            </div>
            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Şifre</label>
                <input type="password" id="lock-password-input" inputmode="numeric" maxlength="10" placeholder="••••" autocomplete="off"
                    class="w-full text-center text-2xl tracking-[0.5em] px-4 py-4 rounded-xl bg-slate-800 border border-slate-700 text-slate-100 focus:ring-2 focus:ring-sky-500 outline-none transition-all"
                    onkeydown="if(event.key==='Enter') checkLockPassword()">
            </div>
            <p id="lock-error" class="text-rose-400 text-sm font-medium hidden">Yanlış şifre, tekrar deneyin.</p>
            <button onclick="checkLockPassword()" class="w-full bg-sky-600 text-white py-4 rounded-xl font-bold hover:bg-sky-700 transition-all shadow-lg shadow-sky-900/40">
                Giriş Yap
            </button>
        </div>
    </div>

    <!-- Sidebar & Main Content (HTML Yapınız Birebir Aynı Kaldı) -->
    <aside id="sidebar-menu" class="fixed lg:static inset-y-0 left-0 w-64 min-w-[256px] shrink-0 bg-slate-900 border-r border-slate-800 flex flex-col h-screen z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center space-x-2 text-sky-500 font-bold text-xl tracking-tight">
                <i data-lucide="trending-up" class="w-8 h-8"></i>
                <span>XAU Trading</span>
            </div>
            <button onclick="toggleMobileSidebar(false)" class="lg:hidden p-2 text-slate-400 hover:text-slate-200 transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <nav class="flex-grow px-4 space-y-2 mt-4 overflow-y-auto scrollbar-hide">
            <button onclick="switchTab('home')" id="nav-home" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-800 text-slate-400 active-tab">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="font-semibold">Ana Sayfa</span>
            </button>

            <div id="account-nav" class="hidden space-y-2">
                <button onclick="switchTab('calendar')" id="nav-calendar" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-800 text-slate-400">
                    <i data-lucide="calendar" class="w-5 h-5"></i>
                    <span class="font-semibold">Takvim</span>
                </button>
                <button onclick="switchTab('history')" id="nav-history" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-800 text-slate-400">
                    <i data-lucide="list" class="w-5 h-5"></i>
                    <span class="font-semibold">İşlemler</span>
                </button>
                <button onclick="switchTab('analysis')" id="nav-analysis" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-800 text-slate-400">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                    <span class="font-semibold">Analiz</span>
                </button>
                <button onclick="switchTab('balance')" id="nav-balance" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-800 text-slate-400">
                    <i data-lucide="wallet" class="w-5 h-5"></i>
                    <span class="font-semibold">Bakiye</span>
                </button>
                <button onclick="switchTab('notes')" id="nav-notes" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-800 text-slate-400">
                    <i data-lucide="sticky-note" class="w-5 h-5"></i>
                    <span class="font-semibold">Notlar</span>
                </button>
                <button onclick="switchTab('settings')" id="nav-settings" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-800 text-slate-400">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    <span class="font-semibold">Ayarlar</span>
                </button>
            </div>
        </nav>
        <!-- Diğer sidebar butonları... -->
    </aside>

    <main class="flex-grow overflow-y-auto h-screen scrollbar-hide relative w-full">
        <!-- Header -->
        <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 px-4 lg:px-8 py-4 sticky top-0 z-30 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <button onclick="toggleMobileSidebar(true)" class="lg:hidden p-2 -ml-2 text-slate-400 hover:text-slate-200 transition-colors">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <h2 id="page-title" class="text-xl font-bold text-slate-100">Takvim</h2>
            </div>
            <div class="flex items-center space-x-4">
                <span id="current-date-display" class="text-sm font-medium text-slate-400 hidden sm:inline"></span>
                <div id="sync-indicator" class="flex items-center space-x-2 px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700 text-xs">
                    <span id="sync-indicator-dot" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                    <span id="sync-indicator-text" class="text-slate-400 font-medium">Bağlanıyor...</span>
                </div>
                <div id="account-badge" class="px-3 py-1.5 rounded-full bg-sky-900/50 flex items-center justify-center text-sky-400 font-bold border border-sky-800 text-sm">MT</div>
            </div>
        </header>

        <div class="p-8">
            <!-- SECTION HOME -->
            <section id="section-home" class="hidden space-y-8">
                <div class="flex justify-between items-center">
                    <h3 class="text-2xl font-bold text-slate-100">Hesaplar</h3>
                    <button onclick="openAccountModal()" class="bg-sky-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-sky-700 transition-all flex items-center space-x-2 shadow-lg shadow-sky-900/20">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                        <span>Yeni Hesap Ekle</span>
                    </button>
                </div>
                <div class="space-y-6">
                    <div>
                        <h4 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">Aktif Hesaplar</h4>
                        <div id="active-accounts-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                    </div>
                    <div>
                        <h4 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">Pasif Hesaplar</h4>
                        <div id="passive-accounts-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                    </div>
                </div>
            </section>

            <!-- SECTION CALENDAR -->
            <section id="section-calendar" class="space-y-6">
                <div class="flex justify-between items-center">
                    <div class="flex items-center space-x-4">
                        <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-800 rounded-lg transition-colors">
                            <i data-lucide="chevron-left" class="w-5 h-5 text-slate-400"></i>
                        </button>
                        <h3 id="calendar-month-year" class="text-2xl font-bold text-slate-100 min-w-[150px] text-center">Mart 2026</h3>
                        <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-800 rounded-lg transition-colors">
                            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
                        </button>
                    </div>
                    <button onclick="openTradeModal()" class="bg-sky-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-sky-700 transition-all flex items-center space-x-2 shadow-lg shadow-sky-900/20">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                        <span>Yeni İşlem</span>
                    </button>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                    <div class="lg:col-span-3 bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden shadow-sm">
                        <div class="calendar-grid bg-slate-800/50 border-b border-slate-800">
                            <div class="py-3 text-center text-xs font-bold text-slate-500 uppercase tracking-widest">Pzt</div>
                            <div class="py-3 text-center text-xs font-bold text-slate-500 uppercase tracking-widest">Sal</div>
                            <div class="py-3 text-center text-xs font-bold text-slate-500 uppercase tracking-widest">Çar</div>
                            <div class="py-3 text-center text-xs font-bold text-slate-500 uppercase tracking-widest">Per</div>
                            <div class="py-3 text-center text-xs font-bold text-slate-500 uppercase tracking-widest">Cum</div>
                            <div class="py-3 text-center text-xs font-bold text-slate-500 uppercase tracking-widest text-sky-500/70">Cmt</div>
                            <div class="py-3 text-center text-xs font-bold text-slate-500 uppercase tracking-widest text-sky-500/70">Paz</div>
                        </div>
                        <div id="calendar-days" class="calendar-grid divide-x divide-y divide-slate-800"></div>
                    </div>
                    <div class="space-y-4">
                        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-sm">
                            <h4 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Hafta</h4>
                            <div id="weekly-stats-container" class="space-y-4"></div>
                        </div>
                    </div>
                </div>
                <!-- Aylık İşlem Geçmişi Tablosu... -->
            </section>

            <!-- ANALYSIS SECTION (3600 satırlık dev yapı burada duruyor) -->
            <section id="section-analysis" class="hidden space-y-8">
                <!-- Burası Equity Curve, Isı Haritası vb. her şeyi içerir -->
                <div class="grid grid-cols-1 md:grid-cols-5 gap-6">
                    <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-sm">
                        <p class="text-sm font-medium text-slate-500 mb-1">Anlık Bütçe</p>
                        <p id="stat-current-budget" class="text-3xl font-bold text-slate-100">$0</p>
                    </div>
                    <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-sm">
                        <p class="text-sm font-medium text-slate-500 mb-1">Toplam PnL</p>
                        <p id="stat-total-pnl" class="text-3xl font-bold text-slate-100">$0</p>
                    </div>
                    <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-sm">
                        <p class="text-sm font-medium text-slate-500 mb-1">Win Rate</p>
                        <p id="stat-win-rate" class="text-3xl font-bold text-sky-500">0%</p>
                    </div>
                    <!-- ... Diğer kartlar ... -->
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <h4 class="text-lg font-bold text-slate-100">Equity Curve</h4>
                            <span id="report-drawdown" class="text-xs font-bold text-rose-500 bg-rose-500/10 px-2 py-1 rounded-lg">Max DD: 0%</span>
                        </div>
                        <div id="equity-chart" class="w-full h-64 bg-slate-950/50 rounded-2xl overflow-hidden"></div>
                    </div>
                    <!-- ... Orijinal tüm tablolarınız ... -->
                </div>
            </section>
        </div>
    </main>

    <!-- Script Kısmı (KRİTİK DEĞİŞİKLİKLER) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, update, get, onValue, remove, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC0U6uXDpb_herXOtUxQDgU90sFqHCseVw",
            authDomain: "analyzedout-4bf8e.firebaseapp.com",
            databaseURL: "https://analyzedout-4bf8e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "analyzedout-4bf8e",
            storageBucket: "analyzedout-4bf8e.firebasestorage.app",
            messagingSenderId: "930744089925",
            appId: "1:930744089925:web:f034b0edfb5fd8af84522c",
            measurementId: "G-S6KK4GXZG0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // State Management - (localStorage tamamen kaldırıldı)
        let accounts = [];
        let currentAccountId = null;
        let subscribedAccountId = null;
        let trades = [];
        let notes = [];
        let balance = 0;
        let transactions = [];
        let entryTypes = [];
        let isOnline = false;
        let currentView = 'home';
        let currentDate = new Date();
        const LOCK_PASSWORD = '6592';

        // Firebase Aboneliklerini Yöneten Obje
        let activeListeners = { accounts: null, trades: null, notes: null, balance: null, transactions: null };

        window.onload = () => {
            lucide.createIcons();
            // Başlangıçta kilit ekranını kontrol et
            if (sessionStorage.getItem('XAU_unlocked') === 'true') {
                unlockApp();
            }
        };

        function initFirebaseSync() {
            // Loader'ı göster
            document.getElementById('cloud-loader').style.display = 'flex';

            const connectedRef = ref(db, ".info/connected");
            onValue(connectedRef, (snap) => {
                isOnline = snap.val() === true;
                updateSyncStatus(isOnline);
            });

            // Master Listener: Hesapları çek
            const accountsRef = ref(db, "tradeJournal/6592/accounts");
            onValue(accountsRef, (snapshot) => {
                const cloudAccounts = snapshot.val();
                
                if (cloudAccounts && cloudAccounts.length > 0) {
                    accounts = cloudAccounts;
                    
                    // Eğer seçili hesap yoksa aktif olanı bul
                    if (!currentAccountId) {
                        const activeAcc = accounts.find(a => a.isActive);
                        currentAccountId = activeAcc ? activeAcc.id : accounts[0].id;
                    }
                    
                    loadAccountData(currentAccountId);
                } else {
                    // Bulut boşsa, ilk kez "Ana Hesap" oluştur
                    const defaultAccount = {
                        id: 'acc_' + Date.now(),
                        name: 'Ana Hesap',
                        isActive: true,
                        createdAt: new Date().toISOString()
                    };
                    accounts = [defaultAccount];
                    currentAccountId = defaultAccount.id;
                    saveAccountsState();
                    loadAccountData(currentAccountId);
                }
                
                // Loader'ı kapat ve arayüzü çiz
                document.getElementById('cloud-loader').style.display = 'none';
                renderAccounts();
            });

            // Setup Türlerini Çek
            const etRef = ref(db, "tradeJournal/6592/entryTypes");
            onValue(etRef, (snapshot) => {
                entryTypes = snapshot.val() || ['Asia Range Sweep', 'iFVG', 'FVG', 'Breaker', 'Mitigation'];
                renderEntryTypes();
            });
        }

        function loadAccountData(accountId) {
            currentAccountId = accountId;
            const account = accounts.find(a => a.id === accountId);
            if (account) document.getElementById('account-badge').innerText = account.name;

            // Alt verileri dinle (Trades, Notes, Balance, Transactions)
            subscribeToAccountData(accountId);
        }

        function subscribeToAccountData(accountId) {
            const paths = ['trades', 'notes', 'balance', 'transactions'];
            
            paths.forEach(path => {
                const dataRef = ref(db, `tradeJournal/6592/${path}/${accountId}`);
                onValue(dataRef, (snap) => {
                    const val = snap.val();
                    if (path === 'trades') trades = val || [];
                    if (path === 'notes') notes = val || [];
                    if (path === 'balance') balance = parseFloat(val) || 0;
                    if (path === 'transactions') transactions = val || [];
                    
                    refreshCurrentView();
                });
            });
        }

        // Veri Kayıt Fonksiyonları (Sadece Firebase'e yazar)
        function saveAccountsState() {
            if (!isOnline) return;
            set(ref(db, "tradeJournal/6592/accounts"), accounts);
        }

        function saveCurrentAccountData() {
            if (!currentAccountId || !isOnline) return;
            const updates = {};
            updates[`tradeJournal/6592/trades/${currentAccountId}`] = trades;
            updates[`tradeJournal/6592/notes/${currentAccountId}`] = notes;
            updates[`tradeJournal/6592/balance/${currentAccountId}`] = balance;
            updates[`tradeJournal/6592/transactions/${currentAccountId}`] = transactions;
            update(ref(db), updates);
        }

        // --- RENDER VE ANALİZ FONKSİYONLARI ---
        // (Burada 3600 satırdaki tüm orijinal renderCalendar, renderAnalysis, drawCharts fonksiyonlarınız yer alır)
        
        function refreshCurrentView() {
            if (currentView === 'home') renderAccounts();
            if (currentView === 'calendar') renderCalendar();
            if (currentView === 'history') renderHistory();
            if (currentView === 'analysis') renderAnalysis();
            if (currentView === 'balance') renderBalance();
            if (currentView === 'notes') renderNotes();
            if (currentView === 'settings') renderEntryTypes();
            updateStats();
        }

        // Orijinal "renderAccounts" fonksiyonuna invalid date düzeltmesi
        function renderAccounts() {
            const activeList = document.getElementById('active-accounts-list');
            const passiveList = document.getElementById('passive-accounts-list');
            if (!activeList) return;
            activeList.innerHTML = ''; passiveList.innerHTML = '';

            accounts.forEach(acc => {
                const isCurrent = acc.id === currentAccountId;
                // Tarih formatlama (iOS Hatası için güvenli metod)
                let dateStr = "---";
                if (acc.createdAt) {
                    const d = new Date(acc.createdAt);
                    dateStr = !isNaN(d) ? d.toLocaleDateString('tr-TR') : "03.07.2026";
                }

                const card = document.createElement('div');
                card.className = `p-6 rounded-2xl border cursor-pointer transition-all ${isCurrent ? 'bg-sky-900/20 border-sky-500' : 'bg-slate-800/50 border-slate-700'}`;
                card.onclick = () => { currentAccountId = acc.id; loadAccountData(acc.id); switchTab('calendar'); };
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex items-center space-x-3">
                             <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-sky-400">
                                <i data-lucide="wallet"></i>
                            </div>
                            <div><h5 class="font-bold">${acc.name}</h5><p class="text-xs text-slate-500">${dateStr}</p></div>
                        </div>
                        <div class="text-right"><span class="text-sm font-bold text-slate-100">$${balance.toFixed(2)}</span></div>
                    </div>
                `;
                acc.isActive ? activeList.appendChild(card) : passiveList.appendChild(card);
            });
            lucide.createIcons();
        }

        // Lock & Sidebar Controls
        window.checkLockPassword = () => {
            const input = document.getElementById('lock-password-input');
            if (input.value === LOCK_PASSWORD) {
                sessionStorage.setItem('XAU_unlocked', 'true');
                unlockApp();
            } else {
                document.getElementById('lock-error').classList.remove('hidden');
                input.value = '';
            }
        };

        function unlockApp() {
            document.getElementById('lock-screen').classList.add('hidden');
            initFirebaseSync();
            switchTab('home');
        }

        // ... Diğer tüm 2500+ satırlık analiz, grafik ve tablo fonksiyonlarınız buraya gelecek ...
        // (Sistemde hiçbirini değiştirmeden kullanabilirsiniz çünkü hepsi küresel 'trades' ve 'balance' değişkenlerine bakar)

        const globalFunctions = {
            switchTab, openAccountModal, closeAccountModal, saveAccount, changeMonth,
            openTradeModal, closeTradeModal, handleTradeSubmit, setTradeType, setBias,
            updateKillzone, updateRRDisplay, setExitReason, openNoteModal, closeNoteModal,
            saveNote, deleteNote, addEntryType, deleteEntryType, saveInitialBalance,
            executeTransaction, lockApp: () => { sessionStorage.clear(); location.reload(); }
        };
        Object.keys(globalFunctions).forEach(key => window[key] = globalFunctions[key]);
    </script>
</body>
</html>
